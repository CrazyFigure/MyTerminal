name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 发布说明需要读取完整 tag 历史，用当前 tag 对比上一个 tag 生成本次变更。
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate release notes
        id: release_notes
        shell: pwsh
        run: |
          # 发布说明只统计当前 tag 相对上一个可达 tag 的提交，避免新版本复用旧版本内容。
          $previousTag = ''
          $previousTagOutput = git describe --tags --abbrev=0 "HEAD^" 2>$null
          if ($LASTEXITCODE -eq 0) {
            $previousTag = $previousTagOutput
          }

          $range = if ($previousTag) { "$previousTag..HEAD" } else { "HEAD" }
          $subjects = git log --format=%s $range

          $groups = [ordered]@{
            '新增' = [System.Collections.Generic.List[string]]::new()
            '修复' = [System.Collections.Generic.List[string]]::new()
            '优化' = [System.Collections.Generic.List[string]]::new()
          }

          foreach ($subject in $subjects) {
            # 发布整理提交只服务版本流程，不作为用户可见变更写入 Release。
            if ($subject -match '^(docs|chore)\(release\):') {
              continue
            }

            $text = $subject -replace '^(feat|fix|docs|refactor|perf|style|chore|test|build|ci)(\([^)]+\))?:\s*', ''
            if ([string]::IsNullOrWhiteSpace($text)) {
              $text = $subject
            }

            if ($subject -match '^feat(\([^)]+\))?:') {
              $groups['新增'].Add($text)
            } elseif ($subject -match '^fix(\([^)]+\))?:') {
              $groups['修复'].Add($text)
            } else {
              $groups['优化'].Add($text)
            }
          }

          $lines = [System.Collections.Generic.List[string]]::new()
          foreach ($heading in $groups.Keys) {
            $lines.Add("${heading}：")
            if ($groups[$heading].Count -gt 0) {
              foreach ($item in $groups[$heading]) {
                $lines.Add("- $item")
              }
            } else {
              $lines.Add("- 本次暂无${heading}项。")
            }
            $lines.Add('')
          }

          $body = ($lines -join [Environment]::NewLine).TrimEnd()
          'body<<__MYTERMINAL_RELEASE_BODY__' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $body | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          '__MYTERMINAL_RELEASE_BODY__' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # 使用 tauri-action 当前公开主版本 v0；上游没有 v1 tag，错误版本会在任务初始化阶段直接失败。
      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: MyTerminal ${{ github.ref_name }}
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          # 使用 action.yml 支持的资产命名参数，让 Release 附件名称稳定可识别。
          assetNamePattern: MyTerminal_[version]_[platform]_[arch][setup][ext]
