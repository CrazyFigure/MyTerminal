name: Star History

on:
  # 定时刷新仓库内静态 SVG，避免 README 依赖第三方实时图片服务。
  schedule:
    - cron: '23 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-star-history:
    name: Update star history SVG
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate star history SVG
        run: node scripts/generate-star-history.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated SVG
        shell: bash
        run: |
          # 只有 SVG 内容变化时才提交，避免每天产生无意义提交。
          if git diff --quiet -- assets/star-history.svg; then
            echo "Star history SVG is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/star-history.svg
          git commit -m "docs: update star history"
          git push
