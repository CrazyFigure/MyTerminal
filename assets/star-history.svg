<svg xmlns="http://www.w3.org/2000/svg" width="860" height="440" viewBox="0 0 860 440" role="img" aria-labelledby="title desc">
  <title id="title">Star History for CrazyFigure/MyTerminal</title>
  <desc id="desc">Fallback preview from current GitHub star count.</desc>
  <style>
